name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck, readiness, build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Production readiness
        run: npm run test:production-readiness

      - name: Definition of Done
        run: npm run test:definition-of-done

      - name: Enterprise certification
        run: npm run test:enterprise-certification

      - name: Enterprise release approval
        run: npm run test:enterprise-release-approval

      - name: Enterprise production go-live
        run: npm run test:enterprise-production-golive

      - name: Enterprise regression
        run: npm run test:enterprise-regression

      - name: Build
        run: npm run build
        env:
          # Build-time placeholders — real secrets live in hosting env, not CI.
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example
          NEXT_PUBLIC_APP_URL: https://www.auroranexis.com
          NEXT_PUBLIC_PADDLE_CLIENT_TOKEN: test_client_token
          PADDLE_ENVIRONMENT: sandbox
